api_version: azuresre.ai/v2
kind: ScheduledTask
metadata:
  name: MOM
spec:
  description: Autonomous month-over-month cost analysis with all 17 Kusto tools
  cronExpression: 15 17 * * *
  agentMode: autonomous
  agent: finops-practitioner
  agentPrompt: '# Month-Over-Month Cost Analysis


    ## Phase 0: Preparation


    Before starting any analysis, read all documents in the knowledge base. Pay special attention to known-issues-and-workarounds.md and any prior run notes. Use what you learn to avoid repeating known errors and to build on previous findings.


    Load your finops-toolkit and azure-cost-management skills.


    Perform a comprehensive autonomous analysis for the last fiscal month and a forecast for the next fiscal month. Each run builds on previous runs — prior research, notes, and results carry forward.


    ## Phase 1: Data Collection


    Execute these Kusto tools in sequence. Use #remember to note operational observations (tool errors, data quality issues, query patterns) as you go — never financial figures.


    ### 1.1 Verify Connectivity

    Run `costs-enriched-base` with startDate=startofmonth(ago(1d)) and endDate=startofmonth(now()) to verify data freshness. Confirm data is less than 24 hours old before proceeding.


    ### 1.2 Fiscal Trends

    Run `monthly-cost-trend` with startDate=startofmonth(ago(365d)) to get 12-month billed and effective cost trends.


    ### 1.3 Service Breakdown

    Run `top-services-by-cost` with N=20, startDate=startofmonth(ago(30d)) to identify top cost-driving services. Flag commitment discount opportunities and right-sizing potential.


    ### 1.4 Resource Group Analysis

    Run `top-resource-groups-by-cost` with default parameters. Identify consolidation opportunities.


    ### 1.5 Anomaly Detection

    Run `cost-anomaly-detection` with numberOfMonths=12, interval=1d. Use deep investigation on any detected anomalies to form hypotheses about root causes.


    ### 1.6 Savings and ESR

    Run `savings-summary-report` with startDate=startofmonth(ago(30d)). Record negotiated discount savings, commitment discount savings, total savings, and Effective Savings Rate (ESR).


    ### 1.7 Commitment Utilization

    Run `commitment-discount-utilization` with startDate=startofmonth(ago(30d)). Compare utilization against the 60-70% industry benchmark.


    **Checkpoint:** Confirm fiscal trends, service breakdown, resource groups, anomalies, savings, and commitments are all collected before proceeding.


    ### 1.8 Forecast

    Run `cost-forecasting-model` with startDate=startofmonth(ago(180d)), forecastPeriods=90, interval=1d. Assess forecast confidence.


    ### 1.9 Reservation Recommendations

    Run `reservation-recommendation-breakdown` to identify top savings opportunities by break-even date and projected savings.


    ### 1.10 Regional Distribution

    Run `cost-by-region-trend` with default parameters. Identify regional optimization opportunities.


    ### 1.11 Resource Types

    Run `top-resource-types-by-cost` with N=20. Identify legacy or inefficient resource types.


    ### 1.12 Tag Coverage

    Run `costs-enriched-base` and analyze tag coverage percentage. Identify untagged resources.


    ### 1.13 Price Benchmarking

    Run `service-price-benchmarking` with startDate=startofmonth(ago(30d)). Compare list, contracted, and effective costs. Identify negative savings anomalies. Compare variance to the 3-5% industry average
    benchmark.


    ### 1.14 Cost Volatility

    Run `cost-anomaly-detection` adapted for 90-day daily spikes. Identify peak cost dates and root causes.


    ### 1.15 Marketplace/Other Purchases

    Run `top-other-transactions` with N=20. Identify large one-time non-usage purchases.


    ### 1.16 Month-over-Month Change

    Run `monthly-cost-change-percentage` with startDate=startofmonth(ago(390d)). Track cost volatility and trend direction.


    **Checkpoint:** Confirm ALL data collection is complete before strategic analysis.


    ## Phase 2: Strategic Analysis


    ### 2.1 ROI and Business Impact

    Calculate ROI = Annual Savings / Implementation Cost for each optimization opportunity. Determine payback period. Compare against industry benchmarks (cost variance 3-5%, RI coverage 60-70%). Create
    opportunity matrix.


    ### 2.2 Quick Wins

    Filter opportunities meeting ALL criteria: implementation < 30 days AND risk = low AND savings > $1000/month. Prioritize: commitment purchases, right-sizing, auto-shutdown.


    ### 2.3 Detailed Findings

    Document 7 sections: (1) Cost Analysis, (2) Savings Analysis, (3) Optimization Opportunities, (4) Governance & Risk, (5) Strategic Market Positioning, (6) Temporal Themes, (7) Implementation Roadmap.
    No raw JSON references — executive-level language only.


    ### 2.4 Recommendations with Performance Grading

    Assign a letter grade (A+ to F) with percentile ranking. Build prioritized actions: Immediate (<30 days), Short-term (30-90 days), Long-term (90+ days). Include dollar savings amount, confidence %,
    and clear owner for each.


    ### 2.5 Implementation Roadmap

    Phase 1 (30 days): quick wins. Phase 2 (60 days): commitments. Phase 3 (90 days): architecture. Include dependencies, risks, success metrics for each phase.


    **Checkpoint:** Validate all deliverables before formatting.


    ## Phase 3: Report Formatting


    Format as a professional, scannable report. Use tables, emoji indicators (📊 💰 🚨 🎯 🏆), bold dollar amounts. Include multi-scenario forecasts (Conservative/Expected/Optimistic), YoY/MoM comparisons, and
    percentile positioning.


    Do not stop or yield until the report is complete and ready for the FinOps team.


    ## Phase 4: Deliver


    **Teams (financial results only):** Post the final report to our Teams channel. Include the executive summary, key findings, grade card, and top recommendations. Do not post intermediate results — only the completed report.


    **Knowledge base (operational learnings only):** Save any new operational insights to the knowledge base — tool errors encountered, workarounds discovered, data quality observations, query patterns that worked or failed. Never save financial figures, cost amounts, savings numbers, or any customer financial data to the knowledge base. Financial detail goes to Teams only.'
