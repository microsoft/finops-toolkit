api_version: azuresre.ai/v1
kind: ScheduledTask
metadata:
  name: CapacityQuarterlyStrategy
spec:
  name: CapacityQuarterlyStrategy
  description: Quarterly capacity strategy review — supply chain maturity, commitment alignment, architecture evolution
  cron_expression: 0 9 1 1,4,7,10 *
  agent_mode: autonomous
  agent: azure-capacity-manager
  agent_prompt: '# Quarterly Capacity Strategy Review


    ## Phase 0: Preparation


    Before starting any analysis, read all documents in the knowledge base. Pay special attention to known-issues-and-workarounds.md and any prior run notes. Use what you learn to avoid repeating known errors and to build on previous findings.


    Load your azure-capacity-management skill.


    Quarterly strategic review bridging capacity management with FinOps rate optimization.

    ## Python tools available for this task

    The following Python tools provide real Azure data via ARM REST API. Always use these instead of `az` CLI commands when available. Pass `client_id` as a parameter to each tool for UAMI authentication.

    - `benefit-recommendations`: Run with billing_scope and lookback to get reservation and savings plan recommendations
    - `resource-graph-query`: Run with query and subscriptions to execute Azure Resource Graph KQL
    - `vm-quota-usage`: Run with subscription_id and location to get VM family quota usage with at-risk thresholds


    ## 1. Supply Chain Maturity Assessment


    Assess maturity across the four supply chain steps:


    | Step | Crawl | Walk | Run |

    |------|-------|------|-----|

    | Forecast | Ad-hoc estimates | Telemetry-based | Automated with CI/CD gates |

    | Procure | Reactive requests | Planned pipeline | Proactive with quota groups |

    | Allocate | No reservations | CRGs for critical SKUs | Shared CRGs with overallocation |

    | Monitor | Manual checks | Alert-based | Automated governance program |


    Score current maturity and recommend next-level actions.


    ## 2. Commitment Alignment


    Run `benefit-recommendations`, `reservation-recommendation-breakdown`, `commitment-discount-utilization`, and `savings-summary-report` Kusto tools with quarterly scope.


    Align capacity reservations with commitment purchases:

    - Which CRGs have matching Azure Reservations? (ideal)

    - Which CRGs are paying full price? (needs reservation)

    - Which reservations don''t have CRG capacity? (supply risk)

    - RI/SP purchase recommendations for next quarter


    Reference: Skill section on "Capacity reservation vs Azure Reservation vs savings plan"


    ## 3. Architecture Review


    Review deployment patterns using `resource-graph-query` for resource inventory and `vm-quota-usage` for multi-subscription quota distribution:

    - Stamp-based isolation health — any stamps at capacity?

    - Multi-subscription quota distribution — balanced?

    - Regional expansion needs for next quarter

    - AKS cluster capacity governance


    Reference: `references/docs/operations/capacity-planning/README.md` and `references/docs/operations/aks-capacity/README.md`


    ## 4. Non-Compute Quotas


    Review non-compute service quotas from available Hub data and resource inventory:

    - Storage account limits

    - Cosmos DB throughput limits

    - Service Bus/Event Hub namespace limits

    - Any service-specific scaling constraints


    Reference: `references/docs/operations/non-compute-quotas/README.md`


    ## 5. Governance Program Health


    Evaluate the capacity governance program:

    - Monthly review cadence maintained?

    - Post-incident reviews conducted for scaling failures?

    - Alert coverage complete?

    - Scripts and tooling up to date?


    Reference: `references/docs/operations/capacity-governance/README.md`


    ## Output


    Quarterly capacity strategy brief for leadership:

    - Supply chain maturity scorecard with progression plan

    - Commitment alignment matrix (capacity + pricing)

    - Quarterly procurement and allocation roadmap

    - Key risks and mitigations

    - Budget impact of capacity decisions


    Use deep investigation for any strategic decisions. Use #remember to note key strategy findings.


    ## Deliver



    **Visualizations:** Before posting, generate charts for key findings using matplotlib or seaborn via the code interpreter. Include at minimum one trend chart and one comparison chart where the data supports it. Embed the chart images inline in the Teams message alongside the text tables. Charts make the report immediately actionable for stakeholders who scan rather than read.

    **Teams (strategy results only):** Post the final quarterly capacity strategy brief to our Teams channel. Include the maturity scorecard, commitment alignment matrix, quarterly roadmap, and key risks. Do not post intermediate results — only the completed strategy brief.


    **Knowledge base (operational learnings only):** Save any new operational insights to the knowledge base — maturity assessment methodology refinements, commitment alignment patterns, architecture observations, CLI workarounds. Never save financial figures, cost amounts, or any customer financial data to the knowledge base. Financial detail goes to Teams only.'
