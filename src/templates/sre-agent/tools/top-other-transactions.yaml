api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: top-other-transactions
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Returns top non-usage, non-commitment purchase transactions such as Marketplace or other miscellaneous purchases. Use it to investigate large non-RI and non-savings-plan charges. Available parameters: N, startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate## and tolower(tostring(ChargeCategory)) != 'usage' and isempty(CommitmentDiscountType) and toreal(BilledCost) > 0
    | top ##N## by toreal(BilledCost)
    | project ChargePeriodStart, ChargeCategory, BilledCost, BillingCurrency, SubAccountName, x_InvoiceSectionName, PricingCategory, PricingQuantity, PricingUnit, ProviderName, PublisherName
  parameters:
  - name: N
    type: string
    description: "Number of top other transactions to return. Default: 10"
    required: true
  - name: startDate
    type: string
    description: "Start date for other transaction search (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))"
    required: true
  - name: endDate
    type: string
    description: "End date for other transaction search (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
