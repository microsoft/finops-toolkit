api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: cost-by-region-trend
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Summarizes effective cost by Azure region for a specified reporting window. Use it to identify regional spend distribution and regional optimization opportunities. Available parameters: startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | summarize EffectiveCost = sum(EffectiveCost) by RegionName
    | order by EffectiveCost desc
  parameters:
  - name: startDate
    type: string
    description: "Start date for the regional cost reporting period (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))"
    required: true
  - name: endDate
    type: string
    description: "End date for the regional cost reporting period (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
