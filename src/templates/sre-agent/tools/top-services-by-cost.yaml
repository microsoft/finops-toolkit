api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: top-services-by-cost
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Returns top Azure services by effective cost for a specified reporting window. Use it to identify the highest-cost services and prioritize service-level cost optimization. Available parameters: N, startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | summarize EffectiveCost = sum(EffectiveCost) by ServiceName
    | top ##N## by EffectiveCost desc
  parameters:
  - name: N
    type: string
    description: "Number of top services to return. Default: 10"
    required: true
  - name: startDate
    type: string
    description: "Start date for service cost analysis (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))"
    required: true
  - name: endDate
    type: string
    description: "End date for service cost analysis (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
