api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: deploy-bulk-budgets
spec:
  type: PythonTool
  connector: ''
  toolMode: Auto
  description: |-
    Discovers enabled subscriptions in a management group with Azure Resource Graph
    and creates or updates a Cost Management budget in each subscription.
  functionCode: |-
    def main(**kwargs):
        from datetime import date
        import re
        import requests

        ARM_ENDPOINT = "https://management.azure.com"
        GRAPH_API_VERSION = "2022-10-01"

        management_group = kwargs.get("management_group")
        amount = kwargs.get("amount")
        contact_emails = kwargs.get("contact_emails")
        budget_name = kwargs.get("budget_name") or "SubscriptionBudget"
        time_grain = kwargs.get("time_grain") or "Monthly"
        email_pattern = r"^[^@\s]+@[^@\s]+\.[^@\s]+$"

        if not isinstance(management_group, str) or not management_group.strip():
            return {"status": "failed", "error": "management_group is required", "deployments": []}
        if amount is None or str(amount).strip() == "":
            return {"status": "failed", "error": "amount is required", "deployments": []}
        if time_grain not in ["Monthly", "Quarterly", "Annually"]:
            return {"status": "failed", "error": "time_grain must be one of Monthly, Quarterly, or Annually", "deployments": []}
        if not contact_emails:
            return {"status": "failed", "error": "contact_emails is required", "deployments": []}
        management_group = management_group.strip()

        if isinstance(contact_emails, str):
            emails = [item.strip() for item in contact_emails.split(",") if item.strip()]
        else:
            emails = [str(item).strip() for item in contact_emails if str(item).strip()]
        if not emails:
            return {"status": "failed", "error": "contact_emails must contain at least one email", "deployments": []}
        invalid_emails = [email for email in emails if not re.match(email_pattern, email)]
        if invalid_emails:
            return {"status": "failed", "error": f"invalid email address: {invalid_emails[0]}", "deployments": []}

        try:
            amount_number = float(amount)
        except (TypeError, ValueError):
            return {"status": "failed", "error": "amount must be numeric", "deployments": []}
        if amount_number <= 0:
            return {"status": "failed", "error": "amount must be greater than 0", "deployments": []}

        today = date.today()
        next_month = today.month + 1
        year = today.year + (1 if next_month == 13 else 0)
        month = 1 if next_month == 13 else next_month
        start_date = date(year, month, 1)
        end_date = date(year + 1, month, 1)

        try:
            client_id = kwargs.get("client_id")
            if client_id:
                from azure.identity import ManagedIdentityCredential
                credential = ManagedIdentityCredential(client_id=client_id)
            else:
                from azure.identity import DefaultAzureCredential
                credential = DefaultAzureCredential()
            token = credential.get_token("https://management.azure.com/.default").token
        except Exception as exc:
            return {"status": "failed", "error": f"failed to acquire Azure credential: {exc}", "deployments": []}
        headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

        query = (
            "ResourceContainers "
            "| where type =~ 'microsoft.resources/subscriptions' "
            "| where properties.state =~ 'Enabled' "
            "| project subscriptionId, name"
        )
        graph_url = f"{ARM_ENDPOINT}/providers/Microsoft.ResourceGraph/resources?api-version={GRAPH_API_VERSION}"
        subscriptions = []
        skip = 0
        page_size = 1000
        while True:
            body = {
                "managementGroups": [management_group],
                "query": query,
                "options": {"$top": page_size, "$skip": skip},
            }
            try:
                response = requests.post(graph_url, headers=headers, json=body, timeout=60)
                response.raise_for_status()
                payload = response.json()
            except Exception as exc:
                return {"status": "failed", "error": f"Resource Graph query failed: {exc}", "deployments": []}
            rows = payload.get("data", [])
            subscriptions.extend(rows)
            if len(rows) < page_size:
                break
            skip += page_size

        budget_body = {
            "properties": {
                "category": "Cost",
                "amount": amount_number,
                "timeGrain": time_grain,
                "timePeriod": {"startDate": start_date.isoformat(), "endDate": end_date.isoformat()},
                "notifications": {
                    "Actual_GreaterThan_80_Percent": {
                        "enabled": True,
                        "operator": "GreaterThan",
                        "threshold": 80,
                        "thresholdType": "Actual",
                        "contactEmails": emails,
                        "contactRoles": ["Owner", "Contributor"],
                    },
                    "Forecasted_GreaterThan_100_Percent": {
                        "enabled": True,
                        "operator": "GreaterThan",
                        "threshold": 100,
                        "thresholdType": "Forecasted",
                        "contactEmails": emails,
                        "contactRoles": ["Owner", "Contributor"],
                    },
                },
            }
        }

        deployments = []
        for sub in subscriptions:
            subscription_id = sub.get("subscriptionId") or sub.get("subscription_id")
            subscription_name = sub.get("name")
            if not subscription_id:
                continue
            if not isinstance(subscription_id, str) or not re.match(guid_pattern, subscription_id):
                deployments.append({
                    "subscription_id": subscription_id,
                    "subscription_name": subscription_name,
                    "budget_name": budget_name,
                    "status": "failed",
                    "error": "subscription_id must be a valid GUID",
                })
                continue
            url = (
                f"https://management.azure.com/subscriptions/{subscription_id}"
                f"/providers/Microsoft.Consumption/budgets/{budget_name}"
                "?api-version=2023-11-01"
            )
            try:
                put_response = requests.put(url, headers=headers, json=budget_body, timeout=120)
                deployments.append({
                    "subscription_id": subscription_id,
                    "subscription_name": subscription_name,
                    "budget_name": budget_name,
                    "status": "created" if put_response.status_code == 201 else "updated" if put_response.status_code == 200 else "failed",
                    "status_code": put_response.status_code,
                    "error": None if put_response.status_code in (200, 201) else put_response.text,
                })
            except Exception as exc:
                deployments.append({
                    "subscription_id": subscription_id,
                    "subscription_name": subscription_name,
                    "budget_name": budget_name,
                    "status": "failed",
                    "error": str(exc),
                })

        return {
            "management_group": management_group,
            "budget_name": budget_name,
            "amount": amount_number,
            "contact_emails": emails,
            "subscription_count": len(subscriptions),
            "created_or_updated": sum(1 for item in deployments if item["status"] in ("created", "updated")),
            "failed": sum(1 for item in deployments if item["status"] == "failed"),
            "deployments": deployments,
        }
  timeoutSeconds: 600
  dependencies:
    - azure-identity
    - requests
  authScopes:
    - ARM
  parameters:
    - name: client_id
      type: string
      description: |-
        Optional UAMI client ID for managed identity authentication. If omitted, uses DefaultAzureCredential.
      required: false
    - name: management_group
      type: string
      description: Management group ID used to discover enabled subscriptions.
      required: true
    - name: amount
      type: string
      description: Budget amount to apply to each subscription.
      required: true
    - name: contact_emails
      type: string
      description: Comma-separated email addresses that receive budget notifications.
      required: true
    - name: budget_name
      type: string
      description: |-
        Budget name. Default: SubscriptionBudget.
      required: false
    - name: time_grain
      type: string
      description: |-
        Budget reset period, such as Monthly, Quarterly, or Annually. Default: Monthly.
      required: false
