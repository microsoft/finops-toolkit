api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: top-resource-groups-by-cost
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Returns top resource groups by effective cost for a specified reporting window. Use it to focus optimization and reporting on the highest-cost resource groups. Available parameters: N, startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | summarize EffectiveCost = sum(EffectiveCost) by SubAccountName, x_ResourceGroupName
    | top ##N## by EffectiveCost desc
  parameters:
  - name: N
    type: string
    description: "Number of top resource groups to return. Default: 5"
    required: true
  - name: startDate
    type: string
    description: "Start date for resource-group cost analysis (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))"
    required: true
  - name: endDate
    type: string
    description: "End date for resource-group cost analysis (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
