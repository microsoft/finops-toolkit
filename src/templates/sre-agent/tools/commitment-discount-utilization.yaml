api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: commitment-discount-utilization
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Analyzes consumed core hours by commitment discount type, including on-demand usage, for a specified reporting window. Use it to review reservation and savings plan utilization mix. Available parameters: startDate, endDate.
  database: hub
  query: |-
    let base = Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | extend x_SkuCoreCount = toint(coalesce(x_SkuDetails.VCPUs, x_SkuDetails.vCores, 0))
    | extend x_ConsumedCoreHours = iff(x_SkuCoreCount > 0, toreal(x_SkuCoreCount) * ConsumedQuantity, real(null));
    let total = base | summarize Total=toreal(sum(x_ConsumedCoreHours));
    base
    | summarize TotalConsumedCoreHours = toreal(sum(x_ConsumedCoreHours)) by CommitmentDiscountType
    | extend CommitmentDiscountType = iff(isempty(CommitmentDiscountType), 'On Demand', CommitmentDiscountType)
    | extend PercentOfTotal = 100.0 * TotalConsumedCoreHours / toscalar(total)
    | project CommitmentDiscountType, TotalConsumedCoreHours=todouble(TotalConsumedCoreHours), PercentOfTotal=todouble(PercentOfTotal)
    | order by PercentOfTotal desc
  parameters:
  - name: startDate
    type: string
    description: "Start date for the utilization reporting period (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))"
    required: true
  - name: endDate
    type: string
    description: "End date for the utilization reporting period (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
