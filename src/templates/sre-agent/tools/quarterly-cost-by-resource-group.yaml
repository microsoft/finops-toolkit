api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: quarterly-cost-by-resource-group
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Returns top resource-group cost rows by subscription and month for a quarterly-style reporting window. Use it to identify high-cost resource groups and single-month cost drivers. Available parameters: N, startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | as filteredCosts
    | extend x_ChargeMonth = startofmonth(ChargePeriodStart)
    | summarize EffectiveCost = sum(EffectiveCost) by SubAccountName, x_ResourceGroupName, x_ChargeMonth
    | order by x_ChargeMonth desc, EffectiveCost desc
    | top ##N## by EffectiveCost
  parameters:
  - name: N
    type: string
    description: "Number of top resource-group rows to return. Default: 5"
    required: true
  - name: startDate
    type: string
    description: "Start date for quarterly resource-group analysis (e.g., startofmonth(ago(90d))). Default: startofmonth(ago(90d))"
    required: true
  - name: endDate
    type: string
    description: "End date for quarterly resource-group analysis (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
