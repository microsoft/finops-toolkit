title: Implementation
content: '• Quota, SKU eligibility, and capacity reservations are three independent ARM surfaces — the portal quota blade only proves the first<br/>• In tenant: the agent reads all three under read-only UAMI auth and joins the result before any deploy is attempted<br/>• In Teams: the verdict lands in the channel the SA is already in, with the surface that would block the deploy named explicitly<br/>• On demand: the same check can be run against the customer''s hub from the meeting room'
notes: 'The customer reads the portal quota blade. The blade returns green. The deploy fails an hour later with SkuNotAvailable, or AllocationFailed, or a zonal stockout. Someone files the support ticket before they have looked at the other two control surfaces.<br/><br/>Inside the customer''s tenant, azure-capacity-manager queries Microsoft dot Quota, Microsoft dot Compute locations skus, and Microsoft dot Compute capacityReservationGroups. Three calls. Read-only managed identity. The agent joins the results and posts a single verdict to the channel the SA is already living in. The deploy decision arrives before the deploy goes out. The image to the right is sample output from a Contoso tenant — every customer card will look different.<br/><br/>The agent does not request quota, does not file a region-access ticket, does not deploy anything. The remediation path is still the SA''s. What changed is the diagnosis lands in the customer''s environment, on a schedule, with the right surface named.'
