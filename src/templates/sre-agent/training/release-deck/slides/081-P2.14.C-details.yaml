content: 'Catalog: `src/templates/sre-agent/CATALOG.md` organizes scheduled tasks into daily, weekly, monthly, quarterly, capacity, and AI bands.<br/>Delivery runtime: scheduled tasks plus a configured Teams notification connector plus `PostTeamsMessage`, where the scheduled-task agent has the Teams tools assigned.<br/>Decision pattern to teach the customer: confirm Teams connector setup; list scheduled tasks; choose a small first set for the customer''s control calendar; assign owners; trim noise.<br/>Operator move: list scheduled tasks, select the first set with the customer, then verify delivery for one task before expanding the roster.'
notes: The catalog organizes tasks across daily, weekly, monthly, quarterly, capacity, and AI bands.<br/><br/>Setup needs the Teams connector and the right tool assignments on the scheduled-task agent. Pick a small first set with the customer, and verify delivery before expanding.<br/><br/>Trust the cadence first. Add tasks once it's earned.
