title: Ask
content: • > "I have quota in this subscription, why is the deployment failing?"<br/>• > "Portal says I have 350 vCPUs available. The deploy still fails with SkuNotAvailable."<br/>• > "Customer finds out at deploy time. Portal 'show quota' gave them the wrong confidence."
notes: This is the most common deal-blocking question across every region.<br/><br/>Portal quota is one signal of three. SKU eligibility and capacity reservation state are the other two. When the deployment fails, it is usually one of those two — not quota itself.<br/><br/>The agent gives you all three signals together, so the conversation moves from guesswork to evidence.
