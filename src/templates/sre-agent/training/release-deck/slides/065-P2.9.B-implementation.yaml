content: '• The `benefit-recommendation-review` task posts a Teams card with reservation and savings plan recommendations: SKU, region, term, hourly commitment, projected monthly savings, and break-even months.<br/>• Named tools: `benefit-recommendations`, `commitment-discount-utilization`, `savings-summary-report`, `reservation-recommendation-breakdown`.<br/>• The card answers two questions: where is the rate-optimization opportunity, and how does each candidate compare on break-even and term?<br/>• Reconciliation against the portal requires `Transactions()` to be populated; if the function is empty, the reconciliation lane is yellow and the customer''s export configuration needs investigation.<br/>• The agent ranks candidates; the customer''s finance and workload owners approve the purchase.'
notes: The benefit review ranks reservation and savings plan candidates.<br/><br/>SKU, region, term, hourly commitment, projected monthly savings, and break-even months. Two questions answered. Where is the opportunity. How do candidates compare.<br/><br/>Reconciliation needs Transactions populated. Empty means yellow until the export gap is fixed.
