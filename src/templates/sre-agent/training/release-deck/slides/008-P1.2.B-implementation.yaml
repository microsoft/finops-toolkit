content: '• The `capacity-monthly-planning` task posts a Teams card that puts CRG state, reservation pairing, capacity utilization, and effective savings rate side by side.<br/>• Named tools: `capacity-reservation-groups`, `vm-quota-usage`, `benefit-recommendations`, `commitment-discount-utilization`, and `savings-summary-report`.<br/>• The card answers three CRG questions in order: Are any CRGs deployed? Are deployed CRGs paired with the right reservations or savings plans? Is utilization high enough to keep the reservation?<br/>• The governance scorecard chart shows whether each FinOps capability sits at Crawl, Walk, or Run. The screenshot is a sample render from a test tenant.'
notes: The monthly card answers three questions in order.<br/><br/>Are reservation groups deployed at all. If yes, are they paired with the right reservation or savings plan. If yes, is utilization high enough to keep them.<br/><br/>Three reads, one decision. The chart shape teaches the read pattern.
