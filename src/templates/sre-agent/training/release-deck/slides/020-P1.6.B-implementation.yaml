title: Implementation
content: '• The `ai-workload-cost-analysis` task delivers monthly Azure OpenAI spend, token volume, model mix, application attribution, and an input-to-output ratio per model.<br/>• Named tools: `ai-token-usage-breakdown`, `ai-model-cost-comparison`, `ai-daily-trend`, `ai-cost-by-application`, plus Azure resource discovery through `RunAzCliReadCommands` and Python analysis through `execute_python`.<br/>• The card answers four questions in order: How much did AI cost this month? Which models drove the spend? Which applications consumed the tokens? Where are prompts oversized relative to completions?<br/>• Read the input-to-output ratio as a prompt-economics signal: a high ratio points to oversized context and a candidate for prompt compaction or cheaper-model substitution.<br/>• Provisioned throughput unit (PTU) sizing and GPU hardware capacity are owned by Azure AI Foundry; this task informs the cost conversation, not the capacity decision.'
notes: The monthly AI workload report shows spend, token volume, model mix, application owner, and the input-to-output ratio per model.<br/><br/>A high ratio means oversized prompts producing short completions — usually the cheapest fix is prompt design before any commitment buy.<br/><br/>Foundry handoff stays explicit. The card is a sample render; your customer's numbers will look different.
