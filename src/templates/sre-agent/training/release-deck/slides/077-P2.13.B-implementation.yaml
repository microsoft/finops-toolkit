title: Implementation
content: '• The `alert-coverage-audit` task surfaces monitoring and anomaly coverage gaps; the `advisor-suppression-review` task surfaces governance gaps in suppressions, ownership, time-to-live, and justification.<br/>• Named tools: `alert-coverage-audit`, `advisor-suppression-review`, `RunAzCliReadCommands` for Resource Graph queries.<br/>• Write tools: `deploy-anomaly-alert`, `deploy-bulk-anomaly-alerts`, `suppress-advisor-recommendations`. Use Review mode for production-affecting changes.<br/>• Read the cards as "where native Cost Management leaves work for the operator": missing alerts, weak routing, orphaned suppressions, or unmanaged governance debt.<br/>• Use native Azure Cost Management where it is enough; use the agent for the scheduled audit-and-deploy loop.'
notes: Two audits, one purpose.<br/><br/>Alert coverage surfaces monitoring and anomaly gaps. Advisor suppression review surfaces governance gaps in suppressions, ownership, time-to-live, and justification.<br/><br/>Native is the dashboard you log into. The agent is autonomous, scheduled, in-tenant, in-Teams. Use both — native for baseline cost management, the agent for the operating loop where native is thin.
