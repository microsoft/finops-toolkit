title: Implementation
content: '• The capacity workstream uses a four-task cadence: a daily monitor, a weekly supply review, a monthly planning brief, and a quarterly strategy review.<br/>• The rhythm separates near-term health, broad supply posture, demand forecasting, and program maturity.<br/>• Named tools: `vm-quota-usage`, `non-compute-quotas`, `sku-availability`, `capacity-reservation-groups`, `benefit-recommendations`, `data-freshness-check`.<br/>• Read each card by horizon: daily means today''s blockers, weekly means breadth and drift, monthly means demand and procurement, quarterly means program change.<br/>• The screenshot is a sample render from a test tenant; teach the cadence and card shape, not specific findings.'
notes: Four scheduled tasks at four cadences.<br/><br/>Daily monitor catches today's blockers. Weekly review checks supply posture. Monthly planning forecasts demand. Quarterly strategy changes the program when maturity gaps persist.<br/><br/>Each layer has its own time horizon and its own decision owner.
