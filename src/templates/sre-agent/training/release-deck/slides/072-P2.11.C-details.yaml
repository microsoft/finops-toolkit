content: '• Catalog map: `src/templates/sre-agent/CATALOG.md` organizes scheduled tasks into daily, weekly, monthly, quarterly, annual, capacity, and AI bands.<br/>• Use customer task outputs to map maturity gaps to specific actions; do not project sample maturity grades onto a customer.<br/>• Operator rule: start with a small live task set, then expand the roster as the customer proves the cadence.<br/>• Operator move: open the catalog, pick three customer-relevant tasks, and wire them into the customer''s operating calendar.'
notes: Open the catalog.<br/><br/>It covers daily, weekly, monthly, quarterly, capacity, and AI bands. Pick three tasks that match the customer's measured gap, and wire them into the operating calendar. Expand later.<br/><br/>Rolling out everything at once creates noise that erodes trust.
