title: Details
content: '• YAML path: `sre-config/scheduled-tasks/capacity-quarterly-strategy.yaml`. Cron: `0 9 1 1,4,7,10 *`. Owner agent: `azure-capacity-manager`.<br/>• Runtime sequence: `vm-quota-usage` → `capacity-reservation-groups` → `RunAzCliReadCommands` (Resource Graph) → `cost-forecasting-model`, followed by commitment checks for next-quarter risk.<br/>• Decision pattern to teach the customer:<br/>```<br/>Quota above 80 percent or planned scale exceeds restricted SKUs: capacity risk; escalate supply.<br/>CRG allocation exceeds reservation: supply risk; review CRG sharing and pairing.<br/>All capacity signals green: capacity is not the current blocker; move the deal team to the next dependency.<br/>```<br/>• Operator move: `srectl scheduledtask invoke capacity-quarterly-strategy` runs the task on demand.'
notes: There's one quarterly task with one owner agent.<br/><br/>The tools run in sequence. The agent joins the evidence and posts the brief. Above eighty percent quota use is a risk signal. A reservation mismatch is a supply risk. If everything is green, stop blaming capacity and look at the next dependency.<br/><br/>You can invoke it on demand for first-quarter verification.
