content: '• Task YAMLs: `sre-config/scheduled-tasks/hubs-health-check.yaml` (daily, `0 6 * * *`) and `sre-config/scheduled-tasks/monitoring-scope-validation.yaml` (weekly, `0 9 * * 4`). Owner agent: `ftk-hubs-agent`.<br/>• Checks: function row-count sanity, staleness, hub version, subscription coverage, and rows missing `SubAccountId`.<br/>• Delivery: `PostTeamsMessage` posts open issues and action items when the Teams connector and tool assignment are configured.<br/>• Decision pattern to teach the customer: green freshness and expected scope means continue finance review; yellow or red on `Transactions()`, version drift, or scope means investigate exports before reconciliation.<br/>• Operator move: invoke the health check on demand and treat yellow or red as a trust boundary.'
notes: Daily freshness, weekly scope.<br/><br/>The checks cover function row counts, staleness, version, subscription count, and missing identifiers. If the data is healthy and scoped, finance keeps reading.<br/><br/>If Transactions is empty, the version has drifted, or there are scope holes, stop and investigate exports before reconciliation.
