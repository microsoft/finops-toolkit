content: '• Scheduled-task entrypoints that deliver Teams results use `PostTeamsMessage` when the Teams notification connector and channel are configured AND the scheduled-task agent has the Teams delivery tools assigned.<br/>• Evidence tasks such as `capacity-daily-monitor`, `capacity-weekly-supply-review`, `mom-report`, and the AI cost reports follow the same card delivery pattern.<br/>• Operator rule: treat the Teams card as the operating artifact and the dashboard as optional follow-up context.<br/>• Operator move: configure the Teams connector after deployment, verify Teams tool assignment on the scheduled-task agent, then invoke one weekly task to confirm delivery.'
notes: The scheduled-task entrypoints use PostTeamsMessage when the connector is configured and the agent has the delivery tools assigned.<br/><br/>The capacity, cost, AI, and hub-health tasks all follow the same card pattern. After deployment, configure the connector, verify the tool assignment, invoke one weekly task, and confirm delivery.<br/><br/>The Teams card is the operating artifact, not a nice-to-have.
