content: • The answer is `PostTeamsMessage`, not another dashboard tab — but Teams delivery requires post-deployment connector setup and explicit Teams tools on the scheduled-task agent.<br/>• When the Teams connector, channel, and tool assignment are configured, capacity and cost tasks deliver operating briefs as Teams cards with findings, charts, and next actions.<br/>• Cards typically include trend, top movers, anomalies, savings, commitment context, and action items.<br/>• Read the card as the operating artifact; the dashboard becomes the optional drill-down.<br/>• The screenshot is a sample render from a test tenant; customer values will differ.
notes: PostTeamsMessage delivers the cards. But Teams delivery requires post-deployment connector setup and explicit Teams tools on the scheduled-task agent.<br/><br/>Cards include trend, movers, anomalies, savings, commitment, and actions. Teams becomes the operating room.<br/><br/>The dashboard becomes the optional drill-down.
