title: Implementation
content: '• The `budget-coverage-audit` and `ytd-report` tasks combine to surface the allocation hygiene gap: tag coverage by resource group, untagged spend share, and budget routing.<br/>• Named tools: `budget-coverage-audit`, `RunAzCliReadCommands` for tag inventory through Azure Resource Graph, `ytd-report` for spend-weighted attribution.<br/>• The cards answer two questions: which resource groups have ownership tags, and what share of spend lives in untagged resources?<br/>• Read coverage by tag, then weighted by spend: a small number of high-cost untagged resource groups can dominate the allocation picture.<br/>• The toolkit detects, quantifies, and routes the cleanup; tag remediation is owned by the customer''s governance team.'
notes: Two tasks combine to surface the gap.<br/><br/>Budget coverage shows tag coverage by resource group. Year-to-date adds the spend-weighted view. When tags are missing, the agent infers portfolio groupings by resource group name pattern — Shared Services, Workloads, FinOps Toolkit — so business reporting is not blocked while governance catches up.<br/><br/>Detect, quantify, route. The toolkit does not fix tags.
