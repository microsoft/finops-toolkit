content: '• YAML paths and crons:<br/>```<br/>sre-config/scheduled-tasks/benefit-recommendation-review.yaml: 0 8 * * 5<br/>sre-config/scheduled-tasks/capacity-quarterly-strategy.yaml: 0 9 1 1,4,7,10 *<br/>```<br/>• Runtime sequence inside the benefit review: `benefit-recommendations` → `reservation-recommendation-breakdown` → `commitment-discount-utilization` → `savings-summary-report`.<br/>• Decision pattern to teach the customer:<br/>```<br/>Demand stable for 12 months or more: validate a 1-year reservation first.<br/>Usage shifts across SKUs or regions: test a savings plan path.<br/>Supply is the blocker: separate the capacity motion from discount guidance.<br/>ODCR commercial terms: route to the Azure capacity owner path.<br/>```<br/>• Operator move: `srectl scheduledtask invoke benefit-recommendation-review` runs the task on demand.'
notes: Two scheduled tasks back this up. There's a Friday benefit review for ranked candidates, and a quarterly strategy review for maturity and program fit.<br/><br/>The weekly Teams post replaces the quarterly reservation review meeting that nobody enjoyed. The decision pattern is straightforward — twelve months of stable demand goes to a one-year reservation, flexible usage triggers the savings plan path, and supply blockers stay separate.<br/><br/>You can run it on demand for a live demo against the customer hub.
