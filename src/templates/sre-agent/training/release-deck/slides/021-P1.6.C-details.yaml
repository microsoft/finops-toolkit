content: '• YAML path: `sre-config/scheduled-tasks/ai-workload-cost-analysis.yaml`. Cron: `0 10 1 * *`. Owner agent: `chief-financial-officer`.<br/>• Runtime sequence: `ai-token-usage-breakdown` → `ai-model-cost-comparison` → `ai-daily-trend` → `ai-cost-by-application` → `RunAzCliReadCommands` (Resource Graph), with `vm-quota-usage` as adjacent context for GPU-capable regions.<br/>• Decision pattern to teach the customer:<br/>```<br/>Usage low and dev-heavy: stay PayGo and optimize prompts first.<br/>Token demand steady and material: route PTU sizing to Azure AI Foundry.<br/>Application or team tags missing: fix attribution before any commitment.<br/>Denial root-cause is GPU hardware versus AOAI quota: Azure AI Foundry owns the answer.<br/>```<br/>• Operator move: `srectl scheduledtask invoke ai-workload-cost-analysis` runs the task on demand.'
notes: This is a monthly task owned by the CFO subagent.<br/><br/>Five AI tools chain together, plus resource discovery for adjacent GPU regions. The decision pattern routes by usage profile. Low and dev-heavy stays on PayGo. Steady and material triggers a PTU conversation with Foundry.<br/><br/>Hardware-versus-quota questions go to Foundry directly.
