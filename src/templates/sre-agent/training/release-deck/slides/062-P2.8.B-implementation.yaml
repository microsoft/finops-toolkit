content: '• The `data-freshness-check` and `hubs-health-check` tasks post a Teams card with row counts, staleness, and a trust verdict for each Hub data function: `Costs()`, `Prices()`, `Recommendations()`, and `Transactions()`.<br/>• `monitoring-scope-validation` adds the export scope view: monitored subscriptions, resource group coverage, and rows missing `SubAccountId`.<br/>• Named tools: `data-freshness-check`, `monitoring-scope-validation`, `RunAzCliReadCommands` for export inventory.<br/>• Read the card as a control readout: freshness first, scope second, gaps third. Remediation belongs to the export owner if the verdict is yellow or red.<br/>• Use the verdict to gate finance reads before reconciliation, not as a guarantee that exports will not break in the future.'
notes: Two tasks combine into the freshness card.<br/><br/>The freshness check posts row counts, staleness, and a trust verdict per data function. The scope check adds monitored subscriptions, resource group coverage, and rows missing the sub-account identifier.<br/><br/>Three reads — fresh, scoped, gaps. Remediation belongs to the export owner.
