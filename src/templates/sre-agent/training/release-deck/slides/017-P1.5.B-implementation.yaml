content: '‚ÄĘ The `sku-availability-audit` task lists every SKU restriction in the requested regions and labels the restriction reason for each one.<br/>‚ÄĘ Named tools: `sku-availability` (compute), `sku-availability` with `resource_provider: kusto` (ADX), `vm-quota-usage`, `non-compute-quotas`.<br/>‚ÄĘ The card distinguishes `NotAvailableForSubscription` (offer-level eligibility) from capacity exhaustion so the field stops blaming "no Azure capacity" when the issue is offer eligibility.<br/>‚ÄĘ It surfaces sibling SKUs in the same region so engineering can validate a substitute before a region negotiation starts.<br/>‚ÄĘ Read the card as a blocker classification: eligibility, capacity, or service-specific availability.'
notes: 'The audit lists every restricted SKU in the requested regions and labels the reason.<br/><br/>Offer-eligibility restrictions are a different fix from capacity exhaustion. Sibling SKUs in the same region give engineering a substitute to test before the region negotiation starts.<br/><br/>Three classifications: eligibility, capacity, or service-specific availability.'
