  theme: Proactive capacity monitoring (no real-time API)
title: Details
content: '• YAML path: `sre-config/scheduled-tasks/capacity-daily-monitor.yaml`. Owner agent: `azure-capacity-manager`.<br/>• Runtime sequence: `vm-quota-usage` → `sku-availability` → `capacity-reservation-groups` → `non-compute-quotas` → `data-freshness-check`. All five run in parallel under read-only UAMI auth.<br/>• Deploy-blocking rule the agent applies before posting the verdict:<br/>```<br/>quota family > 95% of limit          → critical<br/>SKU.restrictions[] blocks region/zone → critical<br/>CRG allocated > reserved             → critical<br/>any of the above true                → block deploy, name the surface<br/>```<br/>• Operator move: `srectl scheduledtask invoke capacity-daily-monitor` runs the task on demand for the customer''s hub.'
notes: 'The five tools all run under the user-assigned managed identity scoped read-only to the subscription and resource group. Nothing in this path can write. The agent cannot create quota requests, cannot create CRGs, cannot move SKUs.<br/><br/>The verdict has three colours. Critical when a quota family is above ninety-five percent of limit, when a SKU has a restrictions entry that blocks the region or zone, or when a capacity reservation group is overallocated. Warning when a family crosses eighty percent. Healthy when all three control surfaces line up. Pipeline freshness from data-freshness-check rides on the same card, because a stale hub will give a confident wrong answer and the SA needs to know which one they are reading.<br/><br/>The same task runs on demand through SRECTL scheduledtask invoke against the customer''s hub. The on-demand call produces the same Teams card the schedule produces, on the same channel, with the same verdict logic.'
