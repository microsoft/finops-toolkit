  theme: Post-deploy ops model — who runs this after we leave?
title: Implementation
content: The schedule carries the recurring analysis rhythm; humans still own decisions, approvals, governance, purchases, and production-impacting changes.<br/>The template includes 5 specialist subagents, 3 skills, 33 tools (21 Kusto plus 12 Python), 18 scheduled tasks, and a FinOps hub Kusto connector.<br/>`PostTeamsMessage` can deliver outputs as Teams cards when the connector and tool assignment are configured.<br/>Read the operating model as "scheduled analysis plus human review," not as autonomous business decisions.<br/>The screenshot is a sample render from a test tenant; customer values will differ.
notes: The schedule carries the recurring analysis rhythm. Five subagents, three skills, thirty-three tools, eighteen scheduled tasks, a hub connector. Teams delivery when configured.<br/><br/>The honest pricing — Azure SRE Agent runs roughly three hundred per month per agent, plus agentic units for active tasks, plus Azure consumption for hub infrastructure. Not free in the licensing sense. Not free in the labor sense. Cheaper than the alternative on any estate above five million annual.<br/><br/>Humans still own decisions, approvals, governance, and anything production-affecting.
