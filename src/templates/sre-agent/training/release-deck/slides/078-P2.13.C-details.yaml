content: '• Task YAMLs and crons:<br/>```<br/>sre-config/scheduled-tasks/alert-coverage-audit.yaml: 0 8 16 * *<br/>sre-config/scheduled-tasks/advisor-suppression-review.yaml: 0 9 1 * *<br/>```<br/>• Native gap proof comes from the customer run: anomaly coverage, scheduled query rules, action group routing, suppression ownership, time-to-live, and justification.<br/>• Added control surfaces: anomaly alert deployment, Advisor suppression governance, Azure Resource Graph queries through `RunAzCliReadCommands`, and Teams delivery through `PostTeamsMessage`.<br/>• Decision pattern to teach the customer: missing anomaly alerts means deploy with approval; orphaned suppression means remove; missing owner or TTL means enforce suppression governance.<br/>• Operator move: invoke the audit on demand, clean one approved gap, and verify in the next run.'
notes: These are two monthly audits.<br/><br/>The customer-specific output drives the gaps — don't carry numbers from a sample run. The write surfaces include anomaly alert deployment, Advisor suppression governance, Resource Graph queries, and Teams delivery.<br/><br/>Production-affecting deploys go through Review mode.
