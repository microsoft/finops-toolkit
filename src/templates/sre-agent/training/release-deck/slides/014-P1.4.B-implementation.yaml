title: Implementation
content: '• The `capacity-quarterly-strategy` task posts a Teams brief that combines quota state, capacity reservation state, regional SKU availability, supply-chain maturity scores, and a prioritized action list.<br/>• Named tools: `vm-quota-usage`, `capacity-reservation-groups`, `reservation-recommendation-breakdown`, `commitment-discount-utilization`, `savings-summary-report`, plus Azure Resource Graph through `RunAzCliReadCommands`.<br/>• The brief scores the supply chain in four steps: Forecast, Procure, Allocate, Monitor. Each step gets a Crawl, Walk, or Run grade so the customer sees where to invest next.<br/>• Read the brief as a triage tool: green capacity moves the deal team to the next dependency; yellow or red triggers a quota or supply remediation plan.<br/>• Microsoft Customer Agreement Consumption (MACC) attainment is owned by the account team''s commercial path, not by this agent.'
notes: The quarterly brief combines quota, capacity reservations, regional SKU availability, and supply-chain maturity in one Teams card.<br/><br/>Four supply-chain steps get a Crawl, Walk, or Run grade. Customers see exactly where to invest next.<br/><br/>MACC commercial questions stay with the account team — that boundary stays explicit.
