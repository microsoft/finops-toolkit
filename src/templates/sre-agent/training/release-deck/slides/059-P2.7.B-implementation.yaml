title: Implementation
content: 'The `chief-financial-officer` agent runs the YTD and MoM reporting tasks and posts a Teams card with actuals, forecast, savings rate, commitment coverage, allocation risk, and freshness verdict in one view.<br/>Named tools: `monthly-cost-trend`, `cost-forecasting-model`, `monthly-cost-change-percentage`, `cost-by-financial-hierarchy`, `quarterly-cost-by-resource-group`, `savings-summary-report`, `commitment-discount-utilization`, `data-freshness-check`.<br/>The card answers four close questions in one place: What did we spend? What will we spend? Where are the discount and allocation gaps? Can finance trust the data?<br/>Read effective savings rate (ESR) against the customer''s own commitment policy; the agent does not impose a target.<br/>Multi-cloud normalization beyond Azure remains partial; route AWS or GCP estate questions to the customer''s cross-cloud platform owner.'
notes: The CFO subagent runs the year-to-date and month-over-month tasks together.<br/><br/>One Teams card with actuals, forecast, savings rate, commitment coverage, allocation risk, and the freshness verdict. Four close questions answered in one place.<br/><br/>Multi-cloud beyond Azure stays partial. Route those questions to the cross-cloud platform owner.
