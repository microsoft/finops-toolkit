content: '• Task YAML: `sre-config/scheduled-tasks/ai-workload-cost-analysis.yaml`. Cron: `0 10 1 * *`. Owner agent: `chief-financial-officer`.<br/>• Operator checks: model mix by `x_SkuDescription`, cost by token direction, application or workload attribution, and input-to-output ratio per model family.<br/>• Use the current Azure pricing page for live customer economics; do not preserve sample prices in the deck.<br/>• Action boundary: the task identifies cheaper-lane and prompt-economics candidates. It does not rewrite prompts, switch deployments, or guarantee model behavior.<br/>• Operator move: invoke the task on demand for the customer hub.'
notes: This runs on the same monthly AI task.<br/><br/>The operator checks the model mix by SKU description, the cost by direction, the attribution, and the input-to-output ratio per family. For pricing, use the current Azure page — don't memorize numbers that age.<br/><br/>The task identifies the cheaper lane. The application owner decides if the swap is safe.
