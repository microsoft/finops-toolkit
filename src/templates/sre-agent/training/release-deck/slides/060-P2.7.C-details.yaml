content: 'Task YAMLs: `sre-config/scheduled-tasks/ytd-report.yaml` and `sre-config/scheduled-tasks/mom-report.yaml`.<br/>Crons: `0 9 1 * *` (monthly) and `15 17 * * *` (daily).<br/>Owner agent: `chief-financial-officer`.<br/>Tool spine: `monthly-cost-trend` → `cost-forecasting-model` → `savings-summary-report` → `commitment-discount-utilization` → `cost-by-financial-hierarchy` → `data-freshness-check`.<br/>Decision pattern to teach the customer: check freshness first, then actuals against forecast, then ESR and commitment coverage, then allocation gaps; convert exceptions into close actions.<br/>Operator move: `srectl scheduledtask invoke ytd-report` runs the task on demand.'
notes: There are two task YAMLs — year-to-date is monthly, and month-over-month is daily.<br/><br/>The tool spine runs trend, forecast, savings, commitment, hierarchy, and freshness. The decision pattern is to check freshness first, then actuals against forecast, then the savings rate and commitment coverage, then the allocation gaps.<br/><br/>The exceptions become close actions.
