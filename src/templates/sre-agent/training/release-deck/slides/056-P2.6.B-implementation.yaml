content: '• The `alert-coverage-audit` task posts a Teams card with the current alert inventory: cost anomaly alerts, scheduled query rules, action group routing, and unused channel paths.<br/>• Named tools: `alert-coverage-audit`, `RunAzCliReadCommands` for alert and action group inventory.<br/>• Read the matrix as a coverage report: where alerts exist, where they route, and which lanes are missing.<br/>• Remediate gaps with `deploy-anomaly-alert` and `deploy-bulk-anomaly-alerts` so anomaly coverage becomes a deploy step, not a wish.<br/>• The chain is audit first, deploy second, route third.'
notes: The audit posts the current alert inventory.<br/><br/>Cost anomaly alerts. Scheduled query rules. Action group routing. Unused channels. Read it as a coverage matrix — where coverage exists and where it is missing.<br/><br/>The deploy tools close the gap. Audit, deploy, route is the chain.
