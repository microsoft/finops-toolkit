title: Ask
content: • > "The customer refuses to change region."<br/>• > "What do you do when the required SKU is blocked where they insist on running?"
notes: Sometimes the customer will not move regions.<br/><br/>The required SKU might still be available — or it might be an offer-eligibility issue rather than a capacity one. Either way, you need evidence before you ask the customer to relocate the workload.<br/><br/>That evidence is what protects the deal.
