content: '• Task YAML: `sre-config/scheduled-tasks/budget-coverage-audit.yaml` (monthly, `0 8 15 * *`). Supporting finance view: `sre-config/scheduled-tasks/ytd-report.yaml`.<br/>• Inputs: Azure Resource Graph for tag inventory, budget inventory, policy assignments, and resource-group coverage.<br/>• Decision pattern to teach the customer: high tag coverage means continue allocation review; missing Owner or CostCenter tags mean route cleanup; high untagged spend share means prioritize governance before chargeback.<br/>• Operator boundary: detect, quantify, route, and track. The agent does not auto-remediate tags or change governance policy.<br/>• Operator move: invoke the audit on demand and route cleanup to the customer''s governance owners.'
notes: This is a monthly budget audit, with year-to-date supporting it through the spend lens.<br/><br/>The inputs come from Resource Graph, budget inventory, policy assignments, and group coverage. The decision pattern is straightforward — high coverage means continue allocation review; missing Owner or CostCenter tags mean route cleanup; a high untagged share means prioritize governance before chargeback.<br/><br/>Auto-remediation is not in scope.
