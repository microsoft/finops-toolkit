api_version: azuresre.ai/v1
kind: ScheduledTask
metadata:
  name: BudgetCoverageAudit
spec:
  name: BudgetCoverageAudit
  description: Monthly audit of subscription budget coverage and missing budget controls
  cron_expression: 0 8 15 * *
  agent_mode: autonomous
  agent: finops-practitioner
  agent_prompt: '# Budget Coverage Audit


    ## Phase 0: Preparation


    Before starting, read all documents in the knowledge base. Pay special attention to budgeting standards, subscription ownership notes, and prior missing-budget findings.

    Teams delivery guard: Check the available tools exactly once per run and remember whether `PostTeamsMessage` is present. Do not call `PostTeamsMessage`, Microsoft Graph, `dynamicInvoke`, raw webhooks, or connector APIs just to test availability. If no Teams connector/channel is configured and this once-per-run check does not find `PostTeamsMessage`, finish the report in the run output and do not retry or probe alternate delivery paths. When a Teams connector/channel is configured, Teams delivery is mandatory: complete the analysis, make one final delivery attempt through `PostTeamsMessage` to the configured Teams channel, and if configured Teams delivery fails, mark the task/run failed instead of degrading to local output or alternate delivery.



    Load your relevant FinOps practitioner skill. Note the `client_id` for Python tool authentication.


    ## Python tools available


    Pass `client_id` as a parameter to each Python tool for UAMI authentication.


    - `resource-graph-query`: Run with `query`, optional `subscription_ids`, and `client_id` to find subscriptions, budget resources, tags, ownership metadata, and budget coverage gaps.


    ## 1. Establish subscription inventory


    Run `resource-graph-query` to identify active subscriptions and subscription metadata needed for ownership, environment, cost center, or portfolio grouping. Exclude subscriptions that are documented as out of scope.


    ## 2. Find configured budgets


    Run `resource-graph-query` against budget resource types and related policy or governance metadata. Identify subscription-level budgets and any documented management-group or shared budget coverage that should count as coverage.


    ## 3. Identify coverage gaps


    Compare active subscriptions with detected budget coverage. Report subscriptions missing budgets, subscriptions with ambiguous budget scope, and subscriptions where owner metadata is missing or incomplete.


    ## 4. Recommend remediation


    Recommend budget creation, owner follow-up, tag correction, or policy remediation for each uncovered subscription. Prioritize production and high-risk environments first.


    ## Report format


    Produce a markdown report with an executive summary, a subscription budget coverage table, a missing-budget table, ownership gaps, and recommended remediation actions.


    ## Persistence


    **Teams (results only):** Post the final report to our Teams channel. Do not post intermediate results. Use `PostTeamsMessage` only when the Teams delivery guard found it available once per run. If Teams delivery is unavailable, or if the single final `PostTeamsMessage` attempt fails because the connector/tool is missing or unauthorized, do not retry or probe alternate delivery paths; return the completed report in the run output with a note that Teams delivery was skipped.


    **Knowledge (#remember):** Save operational findings using #remember for future reference. Do not commit task reports, financial figures, cost amounts, budget amounts, or customer financial data to git or the knowledge base. Financial detail goes to Teams only.


    ## Visualizations


    Before posting, generate charts for key findings using matplotlib or seaborn via the code interpreter. Include at minimum a budget coverage by portfolio chart and a missing-budget count by environment chart where the data supports it. Verify each generated chart non-visually before embedding by checking the output file exists, has non-zero size, opens as an image, and reports expected dimensions and metadata through code interpreter filesystem or image-library checks. Do not use visual inspection as the verification gate; regenerate or omit any chart that fails these checks and state why. Embed chart images inline in the Teams message alongside the text tables.'

