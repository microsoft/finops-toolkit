api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: top-resource-types-by-cost
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Returns top resource types by resource count and effective cost for a specified reporting window. Use it to identify costly resource categories for optimization. Available parameters: N, startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | summarize ResourceCount = count(), EffectiveCost = sum(EffectiveCost) by ResourceType
    | top ##N## by EffectiveCost desc
  parameters:
  - name: N
    type: string
    description: "Number of top resource types to return. Default: 10"
    required: true
  - name: startDate
    type: string
    description: "Start date for resource-type cost analysis (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))"
    required: true
  - name: endDate
    type: string
    description: "End date for resource-type cost analysis (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
