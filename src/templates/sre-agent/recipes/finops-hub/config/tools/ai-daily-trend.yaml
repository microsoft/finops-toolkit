api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: ai-daily-trend
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: 'Daily Azure OpenAI cost and token consumption trend. Use for anomaly detection and forecasting of AI workload costs. Parameters: startDate, endDate.'
  database: hub
  query: "Costs()\n| where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##\n| where x_SkuMeterSubcategory has 'OpenAI'\n| summarize\n    DailyTokens = sum(ConsumedQuantity),\n   \
    \ DailyCost = sum(EffectiveCost)\n    by bin(ChargePeriodStart, 1d)\n| extend CostPer1KTokens = iff(DailyTokens == 0, 0.0, DailyCost / DailyTokens * 1000)\n| order by ChargePeriodStart asc"
  parameters:
  - name: startDate
    type: string
    description: 'Start date. Default: ago(30d)'
    required: true
  - name: endDate
    type: string
    description: 'End date. Default: now()'
    required: true
