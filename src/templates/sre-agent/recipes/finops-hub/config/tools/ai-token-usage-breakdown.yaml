api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: ai-token-usage-breakdown
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: 'Returns Azure OpenAI token consumption broken down by model version and direction (input/output). Calculates unit cost per token. Use when analyzing AI workload costs, token economics, or
    model cost efficiency. Parameters: startDate, endDate.'
  database: hub
  query: "Costs()\n| where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##\n| where x_SkuMeterSubcategory has 'OpenAI'\n| extend Model = x_SkuDescription\n| extend Direction = case(\n\
    \    Model contains 'Input', 'Input',\n    Model contains 'Output', 'Output',\n    'Other')\n| summarize\n    TokenCount = sum(ConsumedQuantity),\n    EffectiveCost = sum(EffectiveCost),\n    BilledCost\
    \ = sum(BilledCost),\n    ListCost = sum(ListCost)\n    by Model, Direction, x_SkuDescription\n| extend UnitCostPerToken = iff(TokenCount == 0, 0.0, EffectiveCost / TokenCount)\n| extend CostPer1KTokens\
    \ = UnitCostPerToken * 1000\n| order by EffectiveCost desc"
  parameters:
  - name: startDate
    type: string
    description: 'Start date (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))'
    required: true
  - name: endDate
    type: string
    description: 'End date (e.g., startofmonth(now())). Default: startofmonth(now())'
    required: true
