api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: ai-model-cost-comparison
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: 'Compares cost per 1K tokens across Azure OpenAI model versions. Identifies which models are most cost-efficient and where switching models could save money. Parameters: startDate, endDate.'
  database: hub
  query: "Costs()\n| where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##\n| where x_SkuMeterSubcategory has 'OpenAI'\n| extend Model = x_SkuDescription\n| summarize\n    TokenCount\
    \ = sum(ConsumedQuantity),\n    EffectiveCost = sum(EffectiveCost),\n    ListCost = sum(ListCost)\n    by Model\n| extend CostPer1KTokens = iff(TokenCount == 0, 0.0, EffectiveCost / TokenCount * 1000)\n\
    | extend ListPer1KTokens = iff(TokenCount == 0, 0.0, ListCost / TokenCount * 1000)\n| extend DiscountPercent = iff(ListCost == 0, 0.0, (ListCost - EffectiveCost) / ListCost * 100)\n| order by EffectiveCost\
    \ desc"
  parameters:
  - name: startDate
    type: string
    description: 'Start date. Default: startofmonth(ago(30d))'
    required: true
  - name: endDate
    type: string
    description: 'End date. Default: startofmonth(now())'
    required: true
