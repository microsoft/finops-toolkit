api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: monthly-cost-change-percentage
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Calculates month-over-month percent change for billed and effective cost. Use it to spot monthly cost spikes, drops, and volatility over a configurable period. Available parameters: startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | summarize BilledCost = sum(BilledCost), EffectiveCost = sum(EffectiveCost) by ChargePeriodStart = startofmonth(ChargePeriodStart)
    | order by ChargePeriodStart asc
    | extend PreviousBilledCost = prev(BilledCost)
    | extend PreviousEffectiveCost = prev(EffectiveCost)
    | project ChargePeriodStart,
        BilledCostChangePct = iff(isempty(PreviousBilledCost), 0.0, toreal((BilledCost - PreviousBilledCost) * 100.0 / PreviousBilledCost)),
        EffectiveCostChangePct = iff(isempty(PreviousEffectiveCost), 0.0, toreal((EffectiveCost - PreviousEffectiveCost) * 100.0 / PreviousEffectiveCost))
  parameters:
  - name: startDate
    type: string
    description: "Start date for monthly change analysis (e.g., startofmonth(ago(390d))). Default: startofmonth(ago(390d))"
    required: true
  - name: endDate
    type: string
    description: "End date for monthly change analysis (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
