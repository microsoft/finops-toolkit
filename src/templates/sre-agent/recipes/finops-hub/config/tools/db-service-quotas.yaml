api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: db-service-quotas
spec:
  type: PythonTool
  connector: ''
  toolMode: Auto
  description: |-
    Reports Azure database service quota usage and regional access signals through ARM REST.
    Covers SQL DB regional vCore quota for Azure SQL Database and Data Warehouse.
    Covers SQL MI managed instance vCore, per-family, and subnet quota usage.
    Covers Cosmos DB subscription account count, per-region account count, and region/AZ access.
    Covers PostgreSQL Flexible Server regional access, HA capability, and per-SKU vCore quota.
    Covers MySQL Flexible Server regional access and zone-redundant HA capability.
    Use include_capabilities for detailed SQL MI hardware family, PostgreSQL, and MySQL capability rows.
    Results normalize locations, utilization percentages, at-risk flags, provider errors, and soft skips.
    The tool uses Azure ARM REST with UAMI or DefaultAzureCredential authentication only.
    Inspired by https://github.com/naspinall-MS/az-quota-helper (MIT).
  functionCode: |-
    def main(**kwargs):
        import re
        import requests

        ARM_ENDPOINT = "https://management.azure.com"
        ARM_SCOPE = "https://management.azure.com/.default"
        LOCATIONS_API_VERSION = "2022-12-01"
        SQL_API_VERSION = "2025-01-01"
        COSMOS_API_VERSION = "2024-11-15"
        PG_CAPABILITIES_API_VERSION = "2024-08-01"
        PG_USAGES_API_VERSION = "2025-06-01-preview"
        MYSQL_CAPABILITIES_API_VERSION = "2023-12-30"
        SERVICE_DISPLAY = {
            "SQLDB": "SQL DB",
            "SQLMI": "SQL MI",
            "COSMOSDB": "Cosmos DB",
            "POSTGRESQL": "PostgreSQL Flex",
            "MYSQL": "MySQL Flex",
        }
        ALL_SERVICE_KEYS = ["SQLDB", "SQLMI", "COSMOSDB", "POSTGRESQL", "MYSQL"]

        subscription_id = kwargs.get("subscription_id")
        include_capabilities = bool(kwargs.get("include_capabilities"))

        result = {
            "subscription_id": subscription_id,
            "services": [],
            "locations": [],
            "quotas": [],
            "region_access": [],
            "at_risk_count": 0,
            "warning_count": 0,
            "critical_count": 0,
            "errors": [],
            "suppressed_error_count": 0,
        }
        if include_capabilities:
            result["capabilities"] = []

        if not subscription_id:
            result["error"] = "subscription_id is required"
            result["errors"].append({"kind": "validation", "message": "subscription_id is required"})
            return result

        def normalize_location(value):
            return "".join(character for character in str(value or "").lower() if character.isalnum())

        def parse_locations(value):
            if not value:
                return []
            if isinstance(value, str):
                raw = value.split(",")
            elif isinstance(value, (list, tuple, set)):
                raw = value
            else:
                raw = [value]
            return [normalize_location(item) for item in raw if normalize_location(item)]

        def parse_services(value):
            if value is None or value == "":
                return set(ALL_SERVICE_KEYS), []
            if isinstance(value, str):
                raw = [item.strip() for item in value.split(",")]
            elif isinstance(value, (list, tuple, set)):
                raw = [str(item).strip() for item in value]
            else:
                raw = [str(value).strip()]
            tokens = [item.upper().replace(" ", "") for item in raw if item]
            if not tokens or "ALL" in tokens:
                invalid = [token for token in tokens if token not in set(ALL_SERVICE_KEYS + ["ALL"])]
                return set(ALL_SERVICE_KEYS), invalid
            invalid = [token for token in tokens if token not in set(ALL_SERVICE_KEYS + ["ALL"])]
            return set(tokens) - {"ALL"}, invalid

        selected_services, invalid_services = parse_services(kwargs.get("services", "All"))
        if invalid_services:
            result["error"] = "Invalid services parameter"
            result["errors"].append({
                "kind": "validation",
                "message": "Invalid services parameter",
                "invalid_services": invalid_services,
                "allowed_services": ALL_SERVICE_KEYS + ["ALL"],
            })
            return result

        result["services"] = [SERVICE_DISPLAY[key] for key in ALL_SERVICE_KEYS if key in selected_services]

        try:
            client_id = kwargs.get("client_id")
            if client_id:
                from azure.identity import ManagedIdentityCredential
                credential = ManagedIdentityCredential(client_id=client_id)
            else:
                from azure.identity import DefaultAzureCredential
                credential = DefaultAzureCredential()
            token = credential.get_token(ARM_SCOPE).token
            headers = {
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json",
            }
        except Exception as exc:
            result["error"] = f"Failed to initialize Azure ARM credential: {exc}"
            result["errors"].append({"kind": "auth", "message": str(exc)})
            return result

        def endpoint(path):
            if str(path).startswith("http"):
                return path
            return f"{ARM_ENDPOINT}{path}"

        def add_error(kind, service, location, url, message, status_code=None, reason=None, suppressed=False):
            row = {
                "kind": kind,
                "service": service,
                "location": normalize_location(location) if location else None,
                "source_endpoint": url,
                "message": message,
            }
            if status_code is not None:
                row["status_code"] = status_code
            if reason:
                row["reason"] = reason
            if suppressed:
                row["suppressed"] = True
                result["suppressed_error_count"] += 1
            result["errors"].append(row)

        def arm_get(path, service, location=None, suppress_cosmos_locations_5xx=False):
            url = endpoint(path)
            try:
                response = requests.get(url, headers=headers, timeout=60)
            except Exception as exc:
                add_error("request_failed", service, location, url, str(exc))
                return None

            if response.status_code >= 400:
                body = ""
                try:
                    body = response.text or ""
                except Exception:
                    body = ""
                if response.status_code == 400 and "NoRegisteredProviderFound" in body:
                    add_error("provider_not_registered", service, location, url, body[:1000], response.status_code, response.reason, True)
                    return None
                if response.status_code == 404:
                    add_error("service_not_in_region", service, location, url, body[:1000], response.status_code, response.reason, True)
                    return None
                if suppress_cosmos_locations_5xx and response.status_code >= 500:
                    add_error("service_not_in_region", service, location, url, body[:1000], response.status_code, response.reason, True)
                    return None
                add_error("http_error", service, location, url, body[:1000], response.status_code, response.reason)
                return None

            try:
                return response.json()
            except Exception as exc:
                add_error("json_parse_failed", service, location, url, str(exc))
                return None

        def arm_get_paged(path, service, location=None):
            rows = []
            next_url = endpoint(path)
            while next_url:
                payload = arm_get(next_url, service, location)
                if payload is None:
                    return rows
                rows.extend(payload.get("value", []))
                next_url = payload.get("nextLink")
            return rows

        def to_float(value):
            if value is None:
                return None
            try:
                return float(value)
            except (TypeError, ValueError):
                return None

        def to_int_or_none(value):
            number = to_float(value)
            if number is None:
                return None
            return int(number)

        def first_present(record, keys, default=None):
            if not isinstance(record, dict):
                return default
            for key in keys:
                value = record.get(key)
                if value is not None:
                    return value
            return default

        def name_value(value):
            if isinstance(value, dict):
                return value.get("localizedValue") or value.get("localized_value") or value.get("value") or value.get("name") or str(value)
            return str(value) if value is not None else ""

        def clean_metric(value):
            metric = name_value(value).strip()
            metric = re.sub(r"\s+for\s+.*$", "", metric, flags=re.IGNORECASE).strip()
            return metric.rstrip(".").strip()

        def add_quota(service, scope, metric, current_value, limit, unit, location, source_endpoint):
            current_number = to_float(current_value)
            limit_number = to_float(limit)
            normalized_limit = int(limit_number) if limit_number is not None else None
            available = None
            utilization_pct = None
            if current_number is not None and limit_number is not None:
                available = int(limit_number - current_number)
                if limit_number > 0:
                    utilization_pct = round((current_number / limit_number) * 100, 2)
            at_risk_80 = bool(utilization_pct is not None and utilization_pct > 80)
            at_risk_95 = bool(utilization_pct is not None and utilization_pct > 95)
            if at_risk_80:
                result["at_risk_count"] += 1
            if at_risk_80 and not at_risk_95:
                result["warning_count"] += 1
            if at_risk_95:
                result["critical_count"] += 1
            result["quotas"].append({
                "service": service,
                "scope": scope,
                "metric": metric,
                "current_value": current_value,
                "limit": normalized_limit,
                "available": available,
                "utilization_pct": utilization_pct,
                "unit": unit,
                "location": normalize_location(location) if location else None,
                "at_risk_80": at_risk_80,
                "at_risk_95": at_risk_95,
                "source_endpoint": source_endpoint,
            })

        def add_region_access(service, location, region_allowed, az_allowed, notes, supports_availability_zone, source_endpoint):
            if isinstance(notes, (list, tuple)):
                note_text = "; ".join([str(note) for note in notes if note])
            else:
                note_text = str(notes or "")
            result["region_access"].append({
                "service": service,
                "location": normalize_location(location),
                "access_allowed_for_region": bool(region_allowed),
                "access_allowed_for_az": az_allowed,
                "notes": note_text,
                "supports_availability_zone": supports_availability_zone,
                "source_endpoint": source_endpoint,
            })

        locations_payload = arm_get(
            f"/subscriptions/{subscription_id}/locations?api-version={LOCATIONS_API_VERSION}",
            "Azure Resource Manager",
        )
        region_has_az = {}
        subscription_locations = []
        if locations_payload:
            for item in locations_payload.get("value", []):
                loc_name = normalize_location(item.get("name") or item.get("displayName"))
                if not loc_name:
                    continue
                subscription_locations.append(loc_name)
                mappings = item.get("availabilityZoneMappings") or []
                region_has_az[loc_name] = bool(mappings)

        requested_locations = parse_locations(kwargs.get("location"))
        if requested_locations:
            locations = requested_locations
        else:
            locations = subscription_locations
        result["locations"] = locations
        if not locations:
            result["error"] = "location did not contain any valid region names and subscription locations could not be enumerated"
            result["errors"].append({"kind": "validation", "message": result["error"]})
            return result

        def sql_region_capabilities(location):
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.Sql/locations/{location}/capabilities?api-version={SQL_API_VERSION}"
            url = endpoint(path)
            payload = arm_get(path, "SQL", location)
            if payload is None:
                return
            root_properties = payload.get("properties", payload)
            region_available = root_properties.get("status") == "Available" or payload.get("status") == "Available"
            mi_families = []
            versions = root_properties.get("supportedManagedInstanceVersions") or payload.get("supportedManagedInstanceVersions") or []
            for version in versions:
                for edition in version.get("supportedEditions", []) or []:
                    for family in edition.get("supportedFamilies", []) or []:
                        family_name = family.get("name") or family.get("family") or family.get("hardwareFamily") or "Unknown"
                        zone_redundant = bool(family.get("zoneRedundant"))
                        mi_families.append({"family": family_name, "zone_redundant": zone_redundant})
                        if include_capabilities:
                            result.setdefault("capabilities", []).append({
                                "service": "SQL MI",
                                "location": normalize_location(location),
                                "hardware_family": family_name,
                                "zone_redundant": zone_redundant,
                                "edition": edition.get("name"),
                                "version": version.get("name"),
                                "source_endpoint": url,
                            })
            if "SQLDB" in selected_services:
                notes = [] if region_available else ["SQL region status is not Available"]
                notes.append("AZ access data not yet available for SQL DB")
                add_region_access("SQL DB", location, region_available, "N/A", notes, None, url)
            if "SQLMI" in selected_services:
                zr_count = sum(1 for family in mi_families if family["zone_redundant"])
                family_count = len(mi_families)
                notes = []
                if not region_available:
                    az_flag = False
                    notes.append("SQL region status is not Available")
                elif not region_has_az.get(normalize_location(location), False):
                    az_flag = "AZNotSupported"
                    notes.append("Region does not advertise availability zones")
                elif family_count > 0 and zr_count == family_count:
                    az_flag = True
                    notes.append("All SQL MI hardware families report zone redundancy")
                elif zr_count > 0:
                    az_flag = "Partial"
                    notes.append("Some SQL MI hardware families report zone redundancy")
                else:
                    az_flag = False
                    notes.append("No SQL MI hardware families report zone redundancy")
                add_region_access("SQL MI", location, region_available, az_flag, notes, region_has_az.get(normalize_location(location), None), url)

        def collect_sql_db_quota(location):
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.Sql/locations/{location}/usages/RegionalVCoreQuotaForSQLDBAndDW?api-version={SQL_API_VERSION}"
            url = endpoint(path)
            payload = arm_get(path, "SQL DB", location)
            if payload is None:
                return
            items = payload.get("value") if isinstance(payload.get("value"), list) else [payload]
            for item in items:
                props = item.get("properties", item)
                metric = clean_metric(props.get("displayName") or item.get("displayName") or item.get("name"))
                add_quota("SQL DB", f"Region ({normalize_location(location)})", metric, props.get("currentValue"), props.get("limit"), props.get("unit"), location, url)

        def collect_sql_mi_quotas(location):
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.Sql/locations/{location}/usages?api-version={SQL_API_VERSION}"
            url = endpoint(path)
            payload = arm_get(path, "SQL MI", location)
            if payload is None:
                return
            for item in payload.get("value", []):
                props = item.get("properties", item)
                raw_name = name_value(item.get("name") or props.get("name"))
                display_name = clean_metric(props.get("displayName") or raw_name)
                include = bool(re.search(r"ManagedInstance|SqlMI|SubnetFor", raw_name, flags=re.IGNORECASE)) or display_name in ["VCore Quota", "Subnet Quota"]
                if not include or re.search(r"Free", raw_name, flags=re.IGNORECASE):
                    continue
                add_quota("SQL MI", f"Region ({normalize_location(location)})", display_name, props.get("currentValue"), props.get("limit"), props.get("unit"), location, url)

        cosmos_locations_cache = None
        cosmos_accounts_cache = None

        def get_cosmos_locations():
            nonlocal cosmos_locations_cache
            if cosmos_locations_cache is not None:
                return cosmos_locations_cache
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.DocumentDB/locations?api-version={COSMOS_API_VERSION}"
            payload = arm_get(path, "Cosmos DB", suppress_cosmos_locations_5xx=True)
            cosmos_locations_cache = payload.get("value", []) if payload else []
            return cosmos_locations_cache

        def get_cosmos_accounts():
            nonlocal cosmos_accounts_cache
            if cosmos_accounts_cache is not None:
                return cosmos_accounts_cache
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.DocumentDB/databaseAccounts?api-version={COSMOS_API_VERSION}"
            cosmos_accounts_cache = arm_get_paged(path, "Cosmos DB")
            return cosmos_accounts_cache

        def collect_cosmos(location):
            loc_endpoint = endpoint(f"/subscriptions/{subscription_id}/providers/Microsoft.DocumentDB/locations?api-version={COSMOS_API_VERSION}")
            matched = None
            for item in get_cosmos_locations():
                item_id = item.get("id", "")
                item_loc = item_id.split("/locations/")[-1] if "/locations/" in item_id else item.get("name")
                if normalize_location(item_loc) == normalize_location(location):
                    matched = item
                    break
            if matched:
                props = matched.get("properties", {})
                supports_az = props.get("supportsAvailabilityZone")
                region_allowed = bool(props.get("isSubscriptionRegionAccessAllowedForRegular"))
                az_allowed_raw = props.get("isSubscriptionRegionAccessAllowedForAz")
                notes = []
                if not region_allowed:
                    notes.append("Subscription regular region access is blocked")
                if supports_az is False:
                    az_allowed = "AZNotSupported"
                    notes.append("Cosmos DB does not support availability zones in this region")
                else:
                    az_allowed = bool(az_allowed_raw)
                    if not az_allowed:
                        notes.append("Subscription AZ access is blocked")
                add_region_access("Cosmos DB", location, region_allowed, az_allowed, notes, supports_az, loc_endpoint)
            else:
                add_error("service_not_in_region", "Cosmos DB", location, loc_endpoint, "Cosmos DB location metadata was not found", suppressed=True)

        def collect_cosmos_quotas():
            accounts = get_cosmos_accounts()
            accounts_endpoint = endpoint(f"/subscriptions/{subscription_id}/providers/Microsoft.DocumentDB/databaseAccounts?api-version={COSMOS_API_VERSION}")
            add_quota("Cosmos DB", "Subscription", "Total Database Accounts (default soft limit: 50)", len(accounts), 50, "Count", None, accounts_endpoint)
            for location in locations:
                count = 0
                for account in accounts:
                    props = account.get("properties", {})
                    account_locations = props.get("locations") or []
                    if any(normalize_location(item.get("locationName")) == normalize_location(location) for item in account_locations):
                        count += 1
                    elif normalize_location(account.get("location")) == normalize_location(location):
                        count += 1
                add_quota("Cosmos DB", f"Region ({normalize_location(location)})", "Database Accounts in Region", count, None, "Count", location, accounts_endpoint)

        def collect_postgresql_capabilities(location):
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.DBforPostgreSQL/locations/{location}/capabilities?api-version={PG_CAPABILITIES_API_VERSION}"
            url = endpoint(path)
            payload = arm_get(path, "PostgreSQL Flex", location)
            if payload is None:
                return
            caps = payload.get("value", [])
            flex = next((item for item in caps if item.get("name") == "FlexibleServerCapabilities"), None)
            if not flex:
                add_region_access("PostgreSQL Flex", location, False, False, "FlexibleServerCapabilities not found", region_has_az.get(normalize_location(location), None), url)
                return
            props = flex.get("properties", flex)
            restricted = props.get("restricted") == "Enabled" or flex.get("restricted") == "Enabled"
            zr_supported = props.get("zoneRedundantHaSupported") == "Enabled" or flex.get("zoneRedundantHaSupported") == "Enabled"
            notes = []
            if restricted:
                notes.append("Region is restricted")
                az_flag = False
            elif not region_has_az.get(normalize_location(location), False):
                notes.append("Region does not advertise availability zones")
                az_flag = "AZNotSupported"
            else:
                az_flag = bool(zr_supported)
                if not zr_supported:
                    notes.append("Zone redundant HA is not enabled")
            add_region_access("PostgreSQL Flex", location, not restricted, az_flag, notes, region_has_az.get(normalize_location(location), None), url)
            if include_capabilities:
                result.setdefault("capabilities", []).append({
                    "service": "PostgreSQL Flex",
                    "location": normalize_location(location),
                    "geoBackupSupported": first_present(props, ["geoBackupSupported", "geoBackupSupportedByDefault"]),
                    "zoneRedundantHaSupported": first_present(props, ["zoneRedundantHaSupported"]),
                    "zoneRedundantHaAndGeoBackupSupported": first_present(props, ["zoneRedundantHaAndGeoBackupSupported"]),
                    "onlineResizeSupported": first_present(props, ["onlineResizeSupported"]),
                    "storageAutoGrowthSupported": first_present(props, ["storageAutoGrowthSupported"]),
                    "source_endpoint": url,
                })

        def collect_postgresql_quotas(location):
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.DBforPostgreSQL/locations/{location}/resourceType/flexibleServers/usages?api-version={PG_USAGES_API_VERSION}"
            url = endpoint(path)
            for item in arm_get_paged(path, "PostgreSQL Flex", location):
                metric = name_value(item.get("name"))
                add_quota("PostgreSQL Flex", f"Region ({normalize_location(location)})", metric, item.get("currentValue"), item.get("limit"), item.get("unit"), location, url)

        def collect_mysql_capabilities(location):
            path = f"/subscriptions/{subscription_id}/providers/Microsoft.DBforMySQL/locations/{location}/capabilities?api-version={MYSQL_CAPABILITIES_API_VERSION}"
            url = endpoint(path)
            payload = arm_get(path, "MySQL Flex", location)
            if payload is None:
                return
            caps = payload.get("value", [])
            if not caps:
                add_region_access("MySQL Flex", location, False, False, "No MySQL Flexible Server capabilities returned; region may be restricted", region_has_az.get(normalize_location(location), None), url)
                return
            zr_supported = False
            for item in caps:
                props = item.get("properties", item)
                ha_modes = props.get("supportedHAMode") or item.get("supportedHAMode") or []
                if isinstance(ha_modes, str):
                    ha_modes = [ha_modes]
                if any("ZoneRedundant" in str(mode) for mode in ha_modes):
                    zr_supported = True
                if include_capabilities:
                    zones = props.get("supportedZones") or props.get("supportedAvailabilityZones") or [props.get("zone")]
                    zones = [zone for zone in zones if zone]
                    if not zones:
                        zones = [None]
                    for zone in zones:
                        result.setdefault("capabilities", []).append({
                            "service": "MySQL Flex",
                            "location": normalize_location(location),
                            "zone": zone,
                            "supportedHAMode": ha_modes,
                            "geoBackupSupported": first_present(props, ["geoBackupSupported", "geoBackupSupport"]),
                            "source_endpoint": url,
                        })
            notes = []
            if not region_has_az.get(normalize_location(location), False):
                az_flag = "AZNotSupported"
                notes.append("Region does not advertise availability zones")
            else:
                az_flag = bool(zr_supported)
                if not zr_supported:
                    notes.append("ZoneRedundant HA mode is not advertised")
            add_region_access("MySQL Flex", location, True, az_flag, notes, region_has_az.get(normalize_location(location), None), url)

        for location in locations:
            if "SQLDB" in selected_services or "SQLMI" in selected_services:
                sql_region_capabilities(location)
            if "SQLDB" in selected_services:
                collect_sql_db_quota(location)
            if "SQLMI" in selected_services:
                collect_sql_mi_quotas(location)
            if "COSMOSDB" in selected_services:
                collect_cosmos(location)
            if "POSTGRESQL" in selected_services:
                collect_postgresql_capabilities(location)
                collect_postgresql_quotas(location)
            if "MYSQL" in selected_services:
                collect_mysql_capabilities(location)

        if "COSMOSDB" in selected_services:
            collect_cosmos_quotas()

        return result
  timeoutSeconds: 300
  dependencies:
    - azure-identity
    - requests
  authScopes:
    - ARM
  parameters:
    - name: client_id
      type: string
      description: Optional UAMI client ID for ManagedIdentityCredential. If omitted, uses DefaultAzureCredential.
      required: false
    - name: subscription_id
      type: string
      description: Azure subscription ID to query for database service quotas and access.
      required: true
    - name: location
      type: string
      description: Optional comma-separated or single Azure region. If omitted, all ARM subscription locations are enumerated.
      required: false
    - name: services
      type: string
      description: Optional comma-separated subset of SqlDB, SqlMI, CosmosDB, PostgreSQL, MySQL, or All. Defaults to All.
      required: false
    - name: include_capabilities
      type: boolean
      description: Include SQL MI hardware-family ZR detail, PostgreSQL/MySQL HA modes, and geo-backup capability rows.
      required: false
