api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: cost-forecasting-model
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Forecasts future effective cost from historical cost data using Kusto time-series forecasting. Use it for budgeting, forward-looking spend estimates, and trend projection. Available parameters: startDate, endDate, forecastPeriods, interval.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | summarize EffectiveCost = sum(EffectiveCost) by bin(ChargePeriodStart, ##interval##)
    | make-series EffectiveCostSeries = sum(EffectiveCost) on ChargePeriodStart from ##startDate## to ##endDate## step ##interval##
    | extend forecast = series_decompose_forecast(EffectiveCostSeries, ##forecastPeriods##)
    | project ChargePeriodStart, EffectiveCostSeries, forecast
  parameters:
  - name: startDate
    type: string
    description: "Start date for historical data used by the forecast (e.g., startofmonth(ago(365d))). Default: startofmonth(ago(365d))"
    required: true
  - name: endDate
    type: string
    description: "End date for historical data used by the forecast (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
  - name: forecastPeriods
    type: string
    description: "Number of future periods to forecast. Default: 90"
    required: true
  - name: interval
    type: string
    description: "Time-series bin and make-series step interval (e.g., 1d). Default: 1d"
    required: true
