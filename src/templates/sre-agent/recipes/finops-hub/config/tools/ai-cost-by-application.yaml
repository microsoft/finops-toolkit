api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: ai-cost-by-application
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: 'Breaks down Azure OpenAI costs by application, team, and environment using resource tags. Use for AI chargeback, showback, and cost allocation. Parameters: startDate, endDate.'
  database: hub
  query: "Costs()\n| where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##\n| where x_SkuMeterSubcategory has 'OpenAI'\n| extend parsedTags = parse_json(Tags)\n| extend Application\
    \ = tostring(parsedTags['application'])\n| extend CostCenter = tostring(parsedTags['CostCenter'])\n| extend Environment = tostring(parsedTags['environment'])\n| extend Team = tostring(parsedTags['team'])\n\
    | summarize\n    TokenCount = sum(ConsumedQuantity),\n    EffectiveCost = sum(EffectiveCost),\n    BilledCost = sum(BilledCost)\n    by Application, CostCenter, Team, Environment, ResourceName, x_SkuMeterSubcategory\n\
    | extend CostPer1KTokens = iff(TokenCount == 0, 0.0, EffectiveCost / TokenCount * 1000)\n| order by EffectiveCost desc"
  parameters:
  - name: startDate
    type: string
    description: 'Start date. Default: startofmonth(ago(30d))'
    required: true
  - name: endDate
    type: string
    description: 'End date. Default: startofmonth(now())'
    required: true
