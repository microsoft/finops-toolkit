api_version: azuresre.ai/v2
kind: ExtendedAgentTool
metadata:
  name: savings-summary-report
spec:
  type: KustoTool
  connector: finops-hub-kusto
  toolMode: Auto
  description: |-
    Summarizes list cost, effective cost, negotiated discount savings, commitment discount savings, total savings, and effective savings rate by billing currency. Use it to quantify savings from rate optimization and commitments. Available parameters: startDate, endDate.
  database: hub
  query: |-
    Costs()
    | where ChargePeriodStart >= ##startDate## and ChargePeriodStart < ##endDate##
    | where not(ChargeCategory == 'Purchase' and isnotempty(CommitmentDiscountCategory))
    | extend x_NegotiatedDiscountSavings = iff(ListCost       < ContractedCost, toreal(0), toreal(ListCost - ContractedCost))
    | extend x_CommitmentDiscountSavings = iff(ContractedCost < EffectiveCost,  toreal(0), toreal(ContractedCost - EffectiveCost))
    | extend x_TotalSavings              = iff(ListCost       < EffectiveCost,  toreal(0), toreal(ListCost - EffectiveCost))
    | summarize
        ListCost = todouble(sum(ListCost)),
        EffectiveCost = todouble(sum(EffectiveCost)),
        x_NegotiatedDiscountSavings = todouble(sum(x_NegotiatedDiscountSavings)),
        x_CommitmentDiscountSavings = todouble(sum(x_CommitmentDiscountSavings)),
        x_TotalSavings = todouble(sum(x_TotalSavings))
        by BillingCurrency
    | extend x_EffectiveSavingsRate = iff(ListCost == 0, 0.0, x_TotalSavings / ListCost * 100.0)
  parameters:
  - name: startDate
    type: string
    description: "Start date for savings summary reporting (e.g., startofmonth(ago(30d))). Default: startofmonth(ago(30d))"
    required: true
  - name: endDate
    type: string
    description: "End date for savings summary reporting (e.g., startofmonth(now())). Default: startofmonth(now())"
    required: true
